<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'DM Sans','Arial',sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, rgba(249,89,132,0.3), rgba(167,139,250,0.3)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #f95984; font-size: 22px; border: 1px solid rgba(249,89,132,0.3); }
  .logo-text { font-size: 22px; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; }
  .tagline { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.6; max-width: 340px; }
  .divider { height: 1px; background: rgba(255,255,255,0.07); width: 100%; }
  .note { font-size: 10px; color: rgba(255,255,255,0.2); font-family: monospace; }
</style>
</head>
<body>
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-chess"></i></div>
    <span class="logo-text">Nekochess</span>
  </div>
  <div class="tagline">Where every move tells a story. Play, learn, and compete in the ultimate chess experience.</div>
  <div class="divider"></div>
  <div class="note">⚠ Logo placeholder — actual logo at /pics/Nekochess_Transparent.png in source app. Copy into assets/ when available.</div>
</body>
</html>
