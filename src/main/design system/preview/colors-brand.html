<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .sw { width: 80px; height: 56px; border-radius: 10px; }
  .label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; }
  .val { font-size: 9px; color: rgba(255,255,255,0.3); font-family: monospace; }
</style>
</head>
<body>
  <div class="swatch"><div class="sw" style="background:#f95984"></div><div class="label">Pink / Brand</div><div class="val">#f95984</div></div>
  <div class="swatch"><div class="sw" style="background:#a78bfa"></div><div class="label">Purple</div><div class="val">#a78bfa</div></div>
  <div class="swatch"><div class="sw" style="background:#7c3aed"></div><div class="label">Purple Deep</div><div class="val">#7c3aed</div></div>
  <div class="swatch"><div class="sw" style="background:#60a5fa"></div><div class="label">Blue</div><div class="val">#60a5fa</div></div>
  <div class="swatch"><div class="sw" style="background:#34d399"></div><div class="label">Green</div><div class="val">#34d399</div></div>
  <div class="swatch"><div class="sw" style="background:#fbbf24"></div><div class="label">Yellow</div><div class="val">#fbbf24</div></div>
  <div class="swatch"><div class="sw" style="background:#fb923c"></div><div class="label">Orange</div><div class="val">#fb923c</div></div>
  <div class="swatch"><div class="sw" style="background:#f97316"></div><div class="label">Orange Alt</div><div class="val">#f97316</div></div>
</body>
</html>
