<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 10px; border: 1px solid; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .name { font-size: 12px; font-weight: 600; }
  .use { font-size: 10px; color: rgba(255,255,255,0.35); margin-left: 4px; }
</style>
</head>
<body>
  <div class="chip" style="border-color:rgba(249,89,132,0.3);background:rgba(249,89,132,0.07)">
    <div class="dot" style="background:#f95984"></div><span class="name" style="color:#f95984">Brand / Primary</span><span class="use">CTAs, eyebrows, links</span>
  </div>
  <div class="chip" style="border-color:rgba(167,139,250,0.3);background:rgba(167,139,250,0.07)">
    <div class="dot" style="background:#a78bfa"></div><span class="name" style="color:#a78bfa">Secondary</span><span class="use">Lang toggle, ML, software</span>
  </div>
  <div class="chip" style="border-color:rgba(251,191,36,0.3);background:rgba(251,191,36,0.07)">
    <div class="dot" style="background:#fbbf24"></div><span class="name" style="color:#fbbf24">Warning / Beta</span><span class="use">Beta notice, education</span>
  </div>
  <div class="chip" style="border-color:rgba(52,211,153,0.3);background:rgba(52,211,153,0.07)">
    <div class="dot" style="background:#34d399"></div><span class="name" style="color:#34d399">Success / Backend</span><span class="use">DB, backend services</span>
  </div>
  <div class="chip" style="border-color:rgba(96,165,250,0.3);background:rgba(96,165,250,0.07)">
    <div class="dot" style="background:#60a5fa"></div><span class="name" style="color:#60a5fa">Info / Frontend</span><span class="use">Tech stack, LinkedIn</span>
  </div>
  <div class="chip" style="border-color:rgba(251,146,60,0.3);background:rgba(251,146,60,0.07)">
    <div class="dot" style="background:#fb923c"></div><span class="name" style="color:#fb923c">Analysis / Bronze</span><span class="use">Game analysis, achievements</span>
  </div>
</body>
</html>
