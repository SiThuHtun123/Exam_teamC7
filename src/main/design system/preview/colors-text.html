<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px 24px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  .sample { font-size: 15px; font-weight: 600; min-width: 180px; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.25); font-family: monospace; }
</style>
</head>
<body>
  <div class="row"><span class="sample" style="color:#ffffff">Heading — Text 1</span><span class="meta">#ffffff · weight 700–800</span></div>
  <div class="row"><span class="sample" style="color:rgba(255,255,255,0.6)">Body copy — Text 2</span><span class="meta">rgba(255,255,255,0.60)</span></div>
  <div class="row"><span class="sample" style="color:rgba(255,255,255,0.55)">Secondary body — Text 3</span><span class="meta">rgba(255,255,255,0.55)</span></div>
  <div class="row"><span class="sample" style="color:rgba(255,255,255,0.45)">Subtitle / hint — Text 4</span><span class="meta">rgba(255,255,255,0.45)</span></div>
  <div class="row"><span class="sample" style="color:rgba(255,255,255,0.35)">Metadata — Text 5</span><span class="meta">rgba(255,255,255,0.35)</span></div>
  <div class="row"><span class="sample" style="color:rgba(255,255,255,0.3)">Ghost / placeholder — Text 6</span><span class="meta">rgba(255,255,255,0.30)</span></div>
</body>
</html>
