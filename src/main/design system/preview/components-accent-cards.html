<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'DM Sans','Arial',sans-serif; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }

  .accent-card { padding: 20px 22px; border-radius: 16px; position: relative; overflow: hidden; border: 1px solid; }
  .accent-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
  .card-label { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .card-text { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.7; margin: 0; }

  /* Software / purple */
  .card-purple { background: linear-gradient(135deg, rgba(167,139,250,0.06) 0%, rgba(10,10,10,0.95) 100%); border-color: rgba(167,139,250,0.25); }
  .card-purple::before { background: linear-gradient(90deg,#a78bfa,#7c3aed); }

  /* Beta / yellow */
  .card-yellow { background: linear-gradient(135deg, rgba(251,191,36,0.06) 0%, rgba(10,10,10,0.95) 100%); border-color: rgba(251,191,36,0.25); }
  .card-yellow::before { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
</style>
</head>
<body>
  <div class="accent-card card-purple">
    <div class="card-label" style="color:#a78bfa"><i class="fa-solid fa-microchip"></i> Powered by Nekochess Software v2.0</div>
    <p class="card-text">Custom-built engine. K-Means clustering. 45+ chess style indicators. No third-party ML library.</p>
  </div>
  <div class="accent-card card-yellow">
    <div class="card-label" style="color:#fbbf24"><i class="fa-solid fa-triangle-exclamation"></i> Nekochess is Currently in Beta</div>
    <p class="card-text">Development is actively continuing and all planned features will be rolled out over time.</p>
  </div>
</body>
</html>
