<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'DM Sans','Arial',sans-serif; padding: 20px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; border-radius: 12px; padding: 12px 22px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid; transition: all 0.2s ease; }
  .btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; }
</style>
</head>
<body>
  <button class="btn" style="background:rgba(249,89,132,0.12);border-color:rgba(249,89,132,0.35);color:#f95984"><i class="fa-solid fa-envelope"></i> Get in Touch</button>
  <button class="btn" style="background:rgba(167,139,250,0.08);border-color:rgba(167,139,250,0.25);color:#a78bfa"><i class="fa-solid fa-language"></i> 日本語</button>
  <button class="btn" style="background:rgba(96,165,250,0.1);border-color:rgba(10,102,194,0.35);color:#60a5fa"><i class="fa-brands fa-linkedin"></i> LinkedIn</button>
  <button class="btn btn-sm" style="background:none;border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)"><i class="fa-solid fa-arrow-left"></i> Back to About</button>
  <button class="btn" style="background:rgba(249,89,132,0.1);border-color:rgba(249,89,132,0.3);color:#f95984;opacity:0.6;cursor:not-allowed">Disabled State</button>
</body>
</html>
