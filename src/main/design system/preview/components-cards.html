<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'DM Sans','Arial',sans-serif; padding: 20px 24px; display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }

  /* Hub card */
  .hub-card { width: 180px; padding: 24px 20px; background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(10,10,10,0.95) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; cursor: pointer; position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 12px; }
  .hub-card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent,#f95984); opacity:0.6; }

  /* Feature card */
  .feat-card { width: 240px; padding: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; display: flex; gap: 12px; position: relative; overflow: hidden; }
  .feat-card::before { content:''; position:absolute; top:0;left:0;bottom:0; width:2px; background:var(--accent,#f95984); opacity:0.8; }

  .icon-w { width: 40px; height: 40px; flex-shrink: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid; font-size: 15px; }
  .title { font-size: 14px; font-weight: 700; color: #fff; margin: 0 0 4px; }
  .desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; margin: 0; }
  .arrow { margin-top: auto; display: flex; justify-content: flex-end; color: rgba(255,255,255,0.2); font-size: 12px; }
</style>
</head>
<body>
  <!-- Hub card -->
  <div class="hub-card" style="--accent:#f95984">
    <div class="icon-w" style="background:rgba(249,89,132,0.1);border-color:rgba(249,89,132,0.25);color:#f95984"><i class="fa-solid fa-chess"></i></div>
    <div>
      <p class="title">About Nekochess</p>
      <p class="desc">Learn what Nekochess is and what makes it unique.</p>
    </div>
    <div class="arrow"><i class="fa-solid fa-arrow-right"></i></div>
  </div>

  <!-- Feature card -->
  <div class="feat-card" style="--accent:#a78bfa">
    <div class="icon-w" style="background:rgba(167,139,250,0.1);border-color:rgba(167,139,250,0.25);color:#a78bfa"><i class="fa-solid fa-robot"></i></div>
    <div>
      <p class="title">PvB — Player vs Bot</p>
      <p class="desc">Challenge built-in bots with distinct personalities and difficulty levels.</p>
    </div>
  </div>
</body>
</html>
