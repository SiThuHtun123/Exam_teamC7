<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .icon-box { display: flex; align-items: center; justify-content: center; border: 1px solid; border-radius: 12px; flex-shrink: 0; }
  .sz-lg { width: 48px; height: 48px; font-size: 20px; }
  .sz-md { width: 40px; height: 40px; font-size: 16px; }
  .sz-sm { width: 32px; height: 32px; font-size: 14px; }
  .label { font-size: 9px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon-box sz-lg" style="background:rgba(249,89,132,0.12);border-color:rgba(249,89,132,0.3);color:#f95984"><i class="fa-solid fa-chess"></i></div>
    <div class="label">48px</div>
  </div>
  <div class="wrap">
    <div class="icon-box sz-md" style="background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.3);color:#a78bfa"><i class="fa-solid fa-robot"></i></div>
    <div class="label">40px</div>
  </div>
  <div class="wrap">
    <div class="icon-box sz-sm" style="background:rgba(96,165,250,0.12);border-color:rgba(96,165,250,0.3);color:#60a5fa"><i class="fa-solid fa-code"></i></div>
    <div class="label">32px</div>
  </div>
  <div class="wrap">
    <div class="icon-box sz-md" style="background:rgba(251,191,36,0.12);border-color:rgba(251,191,36,0.3);color:#fbbf24"><i class="fa-solid fa-trophy"></i></div>
    <div class="label">gold</div>
  </div>
  <div class="wrap">
    <div class="icon-box sz-md" style="background:rgba(52,211,153,0.12);border-color:rgba(52,211,153,0.3);color:#34d399"><i class="fa-solid fa-server"></i></div>
    <div class="label">green</div>
  </div>
  <div class="wrap">
    <div class="icon-box sz-md" style="background:rgba(251,146,60,0.12);border-color:rgba(251,146,60,0.3);color:#fb923c"><i class="fa-solid fa-magnifying-glass-chart"></i></div>
    <div class="label">orange</div>
  </div>
</body>
</html>
