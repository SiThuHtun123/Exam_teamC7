<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: rgba(249,89,132,0.15); border: 1px solid rgba(249,89,132,0.3); width: 52px; height: 52px; }
  .label { font-size: 10px; color: rgba(255,255,255,0.45); text-align: center; }
  .val { font-size: 9px; color: rgba(255,255,255,0.25); font-family: monospace; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="label">md</div><div class="val">10px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="label">lg</div><div class="val">12px</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="label">xl</div><div class="val">14px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">2xl</div><div class="val">16px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="label">3xl</div><div class="val">20px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;width:52px;height:52px"></div><div class="label">full</div><div class="val">9999px</div></div>
</body>
</html>
