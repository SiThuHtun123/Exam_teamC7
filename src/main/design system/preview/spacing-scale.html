<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #0f0f0f; font-family: 'Arial', sans-serif; padding: 20px 24px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .bar { height: 14px; background: rgba(249,89,132,0.5); border-radius: 3px; flex-shrink: 0; }
  .label { font-size: 10px; color: rgba(255,255,255,0.35); font-family: monospace; min-width: 130px; }
</style>
</head>
<body>
  <div class="row"><div class="bar" style="width:4px"></div><div class="label">space-1 · 4px</div></div>
  <div class="row"><div class="bar" style="width:8px"></div><div class="label">space-2 · 8px</div></div>
  <div class="row"><div class="bar" style="width:12px"></div><div class="label">space-4 · 12px</div></div>
  <div class="row"><div class="bar" style="width:16px"></div><div class="label">space-6 · 16px</div></div>
  <div class="row"><div class="bar" style="width:20px"></div><div class="label">space-7 · 20px</div></div>
  <div class="row"><div class="bar" style="width:24px"></div><div class="label">space-8 · 24px</div></div>
  <div class="row"><div class="bar" style="width:32px"></div><div class="label">space-10 · 32px</div></div>
  <div class="row"><div class="bar" style="width:40px"></div><div class="label">space-12 · 40px</div></div>
  <div class="row"><div class="bar" style="width:48px"></div><div class="label">space-13 · 48px</div></div>
  <div class="row"><div class="bar" style="width:80px"></div><div class="label">space-15 · 80px</div></div>
</body>
</html>
