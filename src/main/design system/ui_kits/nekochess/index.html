<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nekochess UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { background: #0f0f0f; font-family: 'DM Sans', Arial, sans-serif; color: #fff; }
  #root { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="AboutHub.jsx"></script>
<script type="text/babel" src="AboutNekochess.jsx"></script>
<script type="text/babel" src="AboutDeveloper.jsx"></script>
<script type="text/babel" src="AboutCredits.jsx"></script>
<script type="text/babel">
const { useState } = React;

const ROUTES = {
  '/about': window.AboutHub,
  '/about/nekochess': window.AboutNekochess,
  '/about/developer': window.AboutDeveloper,
  '/about/credits': window.AboutCredits,
};

function App() {
  const [route, setRoute] = useState('/about');
  const navigate = (to) => { setRoute(to); window.scrollTo(0, 0); };
  const Page = ROUTES[route] || window.AboutHub;
  return <Page navigate={navigate} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
